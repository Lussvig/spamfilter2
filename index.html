<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Spamfilter</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body {
      font-family: Arial, sans-serif;

    #result {
      margin-top: 20px;

      font-weight: bold;
    }

    .small {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>AI Spamfilter</h1>

  <div class="box">
    <p>Skriv eller klistra in ett meddelande nedan. AI-modellen försöker avgöra om det är spam eller inte.</p>

    <textarea id="messageInput" placeholder="Skriv ett meddelande här..."></textarea>

    <button onclick="checkSpam()">Kontrollera meddelande</button>

    <div id="result">Modellen laddas...</div>

    <p class="small">
      Detta är ett enkelt AI-baserat spamfilter gjort med TensorFlow.js.
    </p>
  </div>

  <script>
    let model;
    let metadata;
    let wordIndex = {};
    let maxLength = 100;

    async function loadModel() {
      try {
        model = await tf.loadLayersModel("tfjs_model/model.json");

        const response = await fetch("tfjs_model/metadata.json");
        metadata = await response.json();

        if (metadata.word_index) {
          wordIndex = metadata.word_index;
        } else if (metadata.wordIndex) {
          wordIndex = metadata.wordIndex;
        } else {
          throw new Error("Hittade ingen word_index i metadata.json.");
        }

        const modelInputLength = model.inputs[0].shape[1];

        maxLength =
          metadata.max_len ||
          metadata.maxLength ||
          metadata.max_length ||
          metadata.max_sequence_length ||
          modelInputLength ||
          100;

        document.getElementById("result").innerText =
          "Modellen är laddad och redo.";
        
        console.log("Modell laddad.");
        console.log("Input shape:", model.inputs[0].shape);
        console.log("Max length:", maxLength);
        console.log("Antal ord i word_index:", Object.keys(wordIndex).length);

      } catch (error) {
        document.getElementById("result").innerText =
          "Kunde inte ladda modellen eller metadata. Kontrollera att tfjs_model/model.json och tfjs_model/metadata.json finns.";
        console.error(error);
      }
    }

    function cleanText(text) {
      return text
        .toLowerCase()
        .replace(/[^\wåäöÅÄÖ\s]/g, "")
        .split(/\s+/)
        .filter(word => word.length > 0);
    }

    function textToSequence(text) {
      const words = cleanText(text);
      const unknownToken = wordIndex["<OOV>"] || wordIndex["<UNK>"] || 1;

      return words.map(word => {
        return wordIndex[word] || unknownToken;
      });
    }

    function padSequence(sequence, length) {
      const padded = new Array(length).fill(0);

      const truncated = sequence.slice(-length);

      const start = length - truncated.length;

      for (let i = 0; i < truncated.length; i++) {
        padded[start + i] = truncated[i];
      }

      return padded;
    }

    async function checkSpam() {
      const text = document.getElementById("messageInput").value;

      if (!text.trim()) {
        document.getElementById("result").innerText = "Skriv ett meddelande först.";
        return;
      }

      if (!model) {
        document.getElementById("result").innerText = "Modellen har inte laddats än.";
        return;
      }

      try {
        const sequence = textToSequence(text);
        const padded = padSequence(sequence, maxLength);

        const inputTensor = tf.tensor2d([padded], [1, maxLength], "int32");

        const prediction = model.predict(inputTensor);
        const values = await prediction.data();

        inputTensor.dispose();
        prediction.dispose();

        let spamProbability;

        if (values.length === 1) {
          spamProbability = values[0];
        } else {
          spamProbability = values[1];
        }

        const spamPercent = Math.round(spamProbability * 100);
        const notSpamPercent = Math.round((1 - spamProbability) * 100);

        if (spamProbability >= 0.5) {
          document.getElementById("result").innerText =
            `Resultat: Troligen SPAM (${spamPercent}% spam-sannolikhet)`;
        } else {
          document.getElementById("result").innerText =
            `Resultat: Troligen INTE spam (${notSpamPercent}% inte-spam-sannolikhet)`;
        }

      } catch (error) {
        document.getElementById("result").innerText =
          "Något gick fel vid analysen. Öppna Console med F12 för mer information.";
        console.error(error);
      }
    }

    loadModel();
  </script>
</body>
</html>
